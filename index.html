<!DOCTYPE html>
<html lang="en">
<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0a0a0a;

            font-family: 'Inter', sans-serif;
        }
        .accent-gradient {
            background: linear-gradient(90deg, #3b82f6 0%, #2dd4bf 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="max-w-2xl w-full text-center">
        <h1 class="text-5xl md:text-7xl font-black tracking-tighter mb-4">

        <div class="bg-zinc-900 border border-zinc-800 p-8 rounded-2xl shadow-2xl">

            <p class="text-zinc-500 mb-6 italic">Sign up now for an exclusive early release discount.</p>
            
            <form action="https://formspree.io/f/mvzvjkgg" method="POST" class="flex flex-col md:flex-row gap-3">
                <input 
                    type="email" 
                    name="email" 
                    placeholder="Enter your email" 
                    required
                    class="flex-1 px-5 py-4 rounded-xl bg-zinc-800 border border-zinc-700 focus:outline-none focus:border-blue-500 transition-all text-white"
                >
                <button 
                    type="submit" 
                    class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 px-8 rounded-xl transition-all transform hover:scale-105"
                >
                    Claim Discount
                </button>
            </form>
        </div>

        <div class="mt-12 grid grid-cols-1 md:grid-cols-3 gap-6 text-sm text-zinc-500 uppercase tracking-widest font-medium">
            <div>Precision Data</div>
            <div class="hidden md:block text-zinc-700">•</div>
            <div>Scout Smarter</div>
            <div class="hidden md:block text-zinc-700">•</div>
            <div>Secure Architecture</div>
        </div>
    </div>

</body>
</html>
